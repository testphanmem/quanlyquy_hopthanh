<style>
  /* CSS chuẩn theo thiết kế dự án Sổ Kiểm tra Nội bộ */
  #upload_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10005; justify-content: center; align-items: center; }
  .up-container { background: white; padding: 20px; border-radius: 12px; width: 600px; max-width: 95%; box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-family: "Times New Roman", serif; }
  .up-header { text-align: center; border-bottom: 2px solid #1e3a8a; margin-bottom: 15px; padding-bottom: 10px; }
  .up-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
  .up-dropzone { border: 2px dashed #3b82f6; padding: 25px; text-align: center; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .up-dropzone:hover { background: #eff6ff; }
  .up-dropzone.has-file { border-color: #16a34a; background-color: #dcfce7; border-style: solid; }
  
  #uploadBtn { width: 100%; padding: 12px; background: #7bc4a6; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; opacity: 0.5; pointer-events: none; margin-top: 10px; transition: 0.2s; font-size: 16px; }
  #uploadBtn.active { opacity: 1; pointer-events: auto; }
  #uploadBtn.active:hover { background: #62ab8e; }
  
  .close-up { background: #ef4444; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; float: right; transition: 0.2s; }
  .close-up:hover { background: #dc2626; }
  
  #warnDelete { display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:5px; font-weight:bold; background: #fffbeb; padding: 5px; border-radius: 4px; border: 1px dashed #d97706; }
  
  .btn-create-folder { border: 1px solid #ccc; background: #f0fdf4; color: #16a34a; padding: 0 10px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; display:flex; justify-content:center; align-items:center; transition: 0.2s; }
  .btn-create-folder:hover { background: #dcfce7; }
</style>

<div id="upload_modal">
  <div class="up-container">
    <div class="up-header">
       <h3 style="margin:0; color:#1e3a8a; font-weight:bold;">📁 CHỨNG TỪ TÀI TRỢ</h3>
    </div>
    
    <div class="up-box">
      <label class="fw-bold small mb-1" style="color:#003366;">1. Chọn thư mục lưu trữ (Trung tâm):</label>
      <div style="display:flex; gap:5px;">
          <select id="folderSelect" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px; font-family:'Times New Roman';"><option>⏳ Đang tải...</option></select>
          <button class="btn-create-folder" onclick="toggleNewFolderUI()" title="Tạo thư mục mới"><i class="bi bi-folder-plus"></i></button>
      </div>
      <div id="newFolderArea" style="display:none; margin-top:10px; background:#e0f2fe; padding:10px; border:1px dashed #0284c7; border-radius:4px;">
          <div style="display:flex; gap:5px;">
              <input type="text" id="txtNewFolderName" placeholder="Nhập tên thư mục mới..." style="flex:1; padding:6px; border:1px solid #ccc; border-radius:4px; font-family:'Times New Roman';">
              <button onclick="doCreateNewFolder()" style="background:#059669; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Tạo</button>
              <button onclick="toggleNewFolderUI()" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Hủy</button>
          </div>
          <div id="createFolderStatus" style="font-size:12px; margin-top:5px; font-weight:bold;" class="text-danger"></div>
      </div>
    </div>

    <div class="up-box">
      <label class="fw-bold small" style="display:block; margin-bottom:10px; color:#003366;">2. Chọn chế độ và phương thức tải:</label>
      
      <div style="display:flex; gap:30px; justify-content:center; margin-bottom:15px; font-weight:bold;">
        <label style="cursor:pointer;"><input type="radio" name="upMode" value="file" checked onchange="ChuyenCheDoFileLe()"> 📄 Chọn nhiều File lẻ</label>
        <label style="cursor:pointer;"><input type="radio" name="upMode" value="folder" onchange="changeToFolderMode()"> 📂 Cả thư mục</label>
      </div>
      
      <div style="display:flex; gap:30px; justify-content:center; padding:10px; background:#e0f2fe; border-radius:6px; margin-bottom:15px; font-weight:bold; font-size: 14.5px;">
        <label style="color:#0369a1; cursor:pointer;" title="Xóa tài liệu cũ, thay bằng tài liệu mới">
          <input type="radio" name="writeMode" value="replace" checked onchange="CapNhatLoiCanhBao()"> 🔄 Thay thế tài liệu cũ
        </label>
        <label style="color:#6b21a8; cursor:pointer;" title="Giữ tài liệu cũ, nối thêm tài liệu mới">
          <input type="radio" name="writeMode" value="append" onchange="CapNhatLoiCanhBao()"> ➕ Chèn thêm tài liệu
        </label>
      </div>
      
      <div id="dropZone" class="up-dropzone" onclick="document.getElementById('fileIn').click()">
        <div id="dropZoneContent">
            <span id="fileText" style="font-weight:bold; color:#333; font-size:16px;">Nhấn để chọn file</span>
        </div>
        <input type="file" id="fileIn" style="display:none" onchange="fileSel(this)" multiple>
      </div>
    </div>

    <div id="warnDelete">⚠️ Chứng từ cũ trên Drive sẽ bị xóa vĩnh viễn để thay thế bằng chứng từ mới!</div>

    <div id="upStatus" style="text-align:center; font-weight:bold; min-height:20px; font-size:0.95rem; margin-top:5px;"></div>
    
    <div style="margin-top:10px;">
      <button id="uploadBtn" onclick="doUpload()">BẮT ĐẦU TẢI LÊN</button>
      <button class="close-up" onclick="closeUploadModal()">ĐÓNG</button>
      <div style="clear:both"></div>
    </div>
  </div>
</div>

<script>
  var DANH_SACH_TEP = [];
  var LIEN_KET_CHO_XOA = ""; 
  var MA_THU_MUC_GOC = '1HgvZSYDQWQDj6ElJF4ei9HJWwHB6IEYt'; 

  function openUploadModal() { 
     LIEN_KET_CHO_XOA = document.getElementById('i_proof_url').value || "";
     CapNhatLoiCanhBao();
     document.getElementById('upload_modal').style.display = 'flex'; 
     TaiDanhSachThuMuc();
  }

  function CapNhatLoiCanhBao() {
    const kieuGhi = document.querySelector('input[name="writeMode"]:checked').value;
    const vungCanhBao = document.getElementById('warnDelete');
    if(kieuGhi === 'replace' && LIEN_KET_CHO_XOA && LIEN_KET_CHO_XOA.trim() !== "") {
        vungCanhBao.style.display = 'block';
    } else {
        vungCanhBao.style.display = 'none';
    }
  }

  function closeUploadModal() {
     document.getElementById('upload_modal').style.display = 'none';
     document.getElementById('upStatus').innerText = "";
     document.getElementById('fileIn').value = "";
     document.getElementById('fileText').innerHTML = "Nhấn để chọn file";
     document.getElementById('dropZone').classList.remove('has-file');
     document.getElementById('warnDelete').style.display = 'none';
     document.querySelector('input[name="writeMode"][value="replace"]').checked = true;
     DANH_SACH_TEP = [];
     document.getElementById('uploadBtn').classList.remove('active');
     document.getElementById('uploadBtn').disabled = true;
     document.querySelector('input[name="upMode"][value="file"]').checked = true;
     ChuyenCheDoFileLe();
  }

  function TaiDanhSachThuMuc() {
     const hopChon = document.getElementById('folderSelect');
     hopChon.innerHTML = `<option value="">⏳ Đang tải...</option>`;
     callServer('HT_LayThuMucCon', {taiKhoan: window.TAI_KHOAN_HE_THONG}).then(kq => {
       hopChon.innerHTML = `<option value="${MA_THU_MUC_GOC}">-- Thư mục trung tâm --</option>`;
       if(kq && kq.thanhCong && kq.duLieu) {
         kq.duLieu.forEach(tm => { hopChon.add(new Option("📂 " + tm.tenGoi, tm.maSo)); });
       }
     }).catch(loi => console.error(loi));
  }

  function ChuyenCheDoFileLe() {
     const theNhap = document.getElementById('fileIn');
     theNhap.removeAttribute('webkitdirectory'); theNhap.removeAttribute('directory'); 
     theNhap.setAttribute('multiple', 'multiple'); 
     LamMoiHopChonFile();
  }

  function changeToFolderMode() {
     const theNhap = document.getElementById('fileIn');
     theNhap.setAttribute('webkitdirectory', ''); theNhap.setAttribute('directory', ''); theNhap.setAttribute('multiple', 'multiple');
     LamMoiHopChonFile();
  }

  function LamMoiHopChonFile() {
     document.getElementById('fileIn').value = "";
     document.getElementById('fileText').innerHTML = "Nhấn để chọn file";
     document.getElementById('dropZone').classList.remove('has-file');
     document.getElementById('uploadBtn').disabled = true; 
     document.getElementById('uploadBtn').classList.remove('active');
     DANH_SACH_TEP = [];
  }

  function fileSel(theHienTai) {
     if (theHienTai.files.length > 0) {
       DANH_SACH_TEP = theHienTai.files;
       const cheDoChon = document.querySelector('input[name="upMode"]:checked').value;
       
       document.getElementById('dropZone').classList.add('has-file'); 
       
       if (cheDoChon === 'folder') {
          document.getElementById('fileText').innerText = `📂 ${DANH_SACH_TEP[0].webkitRelativePath.split('/')[0]} (${DANH_SACH_TEP.length} file)`;
       } else {
          if (DANH_SACH_TEP.length === 1) {
              document.getElementById('fileText').innerText = "📄 " + DANH_SACH_TEP[0].name;
          } else {
              document.getElementById('fileText').innerText = `📄 Đã chọn ${DANH_SACH_TEP.length} file lẻ`;
          }
       }
       document.getElementById('uploadBtn').disabled = false;
       document.getElementById('uploadBtn').classList.add('active');
     }
  }

  function DocTepDuLieu(tepMoi) {
      return new Promise((thanhCong, thatBai) => {
          const boDoc = new FileReader();
          boDoc.onload = sk => thanhCong(sk.target.result.split(',')[1]);
          boDoc.onerror = loi => thatBai(loi);
          boDoc.readAsDataURL(tepMoi);
      });
  }

  async function doUpload() {
     if (!DANH_SACH_TEP || DANH_SACH_TEP.length === 0) return;
     const nutBam = document.getElementById('uploadBtn'), stTrangThai = document.getElementById('upStatus');
     const maThuMucDich = document.getElementById('folderSelect').value || MA_THU_MUC_GOC; 
     const cheDoTai = document.querySelector('input[name="upMode"]:checked').value;
     
     const cheDoGhi = document.querySelector('input[name="writeMode"]:checked').value;
     const lkCanXoa = (cheDoGhi === 'replace') ? LIEN_KET_CHO_XOA : "";
     
     nutBam.classList.remove('active');
     nutBam.disabled = true;
     stTrangThai.style.color = "blue"; 
     
     if (lkCanXoa) {
         stTrangThai.innerText = "⏳ Đang dọn dẹp các hồ sơ lưu trữ cũ...";
         const danhSachLkCu = lkCanXoa.split(',');
         for(let i = 0; i < danhSachLkCu.length; i++) {
             let lkThuCu = danhSachLkCu[i].trim();
             if(lkThuCu) {
                 try { await callServer('HT_XoaTaiLieu', {lienKetTep: lkThuCu, taiKhoan: window.TAI_KHOAN_HE_THONG}); } catch(loi) {}
             }
         }
     }
     
     if (cheDoTai === 'file') {
         let tapHopLienKet = [];
         let tapHopTen = [];
         
         for (let i = 0; i < DANH_SACH_TEP.length; i++) {
             let tepHienTai = DANH_SACH_TEP[i];
             stTrangThai.innerText = `⏳ Đang xử lý truyền tải ${i + 1}/${DANH_SACH_TEP.length}...`;
             
             try {
                 let b64 = await DocTepDuLieu(tepHienTai);
                 let ketQuaTai = await callServer('HT_TaiTaiLieu', {
                     duLieuB64: b64, tenTep: tepHienTai.name, kieuDuLieu: tepHienTai.type, 
                     idThuMucDich: maThuMucDich, lienKetCu: "", taiKhoan: window.TAI_KHOAN_HE_THONG
                 });
                 
                 if (ketQuaTai.thanhCong) {
                     tapHopLienKet.push(ketQuaTai.lienKet);
                     tapHopTen.push(ketQuaTai.tenGoi);
                 } else {
                     throw new Error(ketQuaTai.thongBao);
                 }
             } catch (loi) {
                 stTrangThai.style.color = "red"; stTrangThai.innerText = "❌ Lỗi: " + loi.message;
                 nutBam.classList.add('active'); nutBam.disabled = false;
                 return;
             }
         }
         
         stTrangThai.style.color = "green"; stTrangThai.innerText = "✅ Tải lên thành công!";
         if (typeof window.TraLienKetVeChinh === 'function') {
             window.TraLienKetVeChinh(tapHopLienKet.join(', '), tapHopTen.join(' + '), cheDoGhi);
         }
         setTimeout(closeUploadModal, 1000);

     } else { 
       const tenFolderMoi = DANH_SACH_TEP[0].webkitRelativePath.split('/')[0];
       let mangDuLieu = []; let dem = 0;
       stTrangThai.innerText = `⏳ Đang đóng gói ${DANH_SACH_TEP.length} file...`;
       
       Array.from(DANH_SACH_TEP).forEach(tepItem => {
          const docTep = new FileReader();
          docTep.onload = sk => {
             mangDuLieu.push({ tenTep: tepItem.name, kieuDuLieu: tepItem.type, duLieu: sk.target.result.split(',')[1] });
             dem++;
             if (dem === DANH_SACH_TEP.length) {
                stTrangThai.innerText = "⏳ Đang chuyển gói hồ sơ lên máy chủ...";
                callServer('HT_TaiThuMuc', {idThuMucDich: maThuMucDich, tenThuMuc: tenFolderMoi, danhSachTep: mangDuLieu, lienKetCu: "", taiKhoan: window.TAI_KHOAN_HE_THONG})
                  .then(kqTai => { 
                      if(kqTai.thanhCong) {
                          stTrangThai.style.color = "green"; stTrangThai.innerText = "✅ Tải lên thành công!";
                          if (typeof window.TraLienKetVeChinh === 'function') {
                              window.TraLienKetVeChinh(kqTai.lienKet, kqTai.tenGoi, cheDoGhi);
                          }
                          setTimeout(closeUploadModal, 1000);
                      } else {
                          stTrangThai.style.color = "red"; stTrangThai.innerText = "❌ " + kqTai.thongBao;
                          nutBam.classList.add('active'); nutBam.disabled = false;
                      }
                  })
                  .catch(loi => { 
                      stTrangThai.style.color = "red"; stTrangThai.innerText = "❌ " + loi.message;
                      nutBam.classList.add('active'); nutBam.disabled = false;
                  });
             }
          };
          docTep.readAsDataURL(tepItem);
       });
     }
  }

  function toggleNewFolderUI(){ var a = document.getElementById('newFolderArea'); a.style.display = a.style.display === 'none' ? 'block' : 'none'; }
  
  function doCreateNewFolder(){ 
    var tenDienVao = document.getElementById('txtNewFolderName').value;
    var viTriGoc = document.getElementById('folderSelect').value || MA_THU_MUC_GOC; 
    if(!tenDienVao) return; 
    document.getElementById('createFolderStatus').innerText = "⏳ Đang khởi tạo...";
    
    callServer('HT_TaoThuMucMoi', {idCha: viTriGoc, tenThuMuc: tenDienVao, taiKhoan: window.TAI_KHOAN_HE_THONG}).then(kqKhoiTao => { 
       if(kqKhoiTao.thanhCong){ 
          var menuChon = document.getElementById('folderSelect'); 
          menuChon.add(new Option("📂 " + kqKhoiTao.tenGoi, kqKhoiTao.maSo)); 
          menuChon.value = kqKhoiTao.maSo; 
          document.getElementById('txtNewFolderName').value = "";
          document.getElementById('createFolderStatus').innerText = "";
          toggleNewFolderUI(); 
       } else {
          document.getElementById('createFolderStatus').innerText = "❌ Lỗi: " + kqKhoiTao.thongBao;
       }
    }).catch(loi => {
        document.getElementById('createFolderStatus').innerText = "❌ Lỗi: " + loi.message;
    });
  }
</script>
